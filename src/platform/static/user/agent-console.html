<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Agent 実行コンソール – MAF Platform</title>
  <link rel="stylesheet" href="/static/shared/style.css">
</head>
<body>
  <header id="app-header" class="app-header"></header>

  <div class="container" style="max-width:800px">
    <div class="page-header">
      <h1 id="agent-title">Agent 実行コンソール</h1>
      <a href="/static/user/agents.html" class="btn">← 一覧に戻る</a>
    </div>

    <div class="card">
      <div class="flex gap-1 mb-2">
        <div class="form-group" style="flex:1;margin-bottom:0">
          <label for="agent-select">Agent</label>
          <select id="agent-select" onchange="onAgentChange()">
            <option value="">— 選択 —</option>
          </select>
        </div>
        <div class="form-group" style="width:200px;margin-bottom:0">
          <label for="session-id">Session</label>
          <input type="text" id="session-id" placeholder="(auto)" readonly>
        </div>
      </div>
    </div>

    <div class="card mt-2 chat-container" id="chat-area">
      <div class="chat-messages" id="messages">
        <div class="empty-state">Agent を選択して会話を開始してください</div>
      </div>

      <div class="chat-input">
        <input type="text" id="chat-input" placeholder="メッセージを入力..." onkeydown="if(event.key==='Enter')sendMessage()">
        <button class="btn btn-primary" id="btn-send" onclick="sendMessage()">送信</button>
      </div>
    </div>

    <div id="trace-bar" class="mt-1 hidden">
      <span class="trace-link" id="trace-id"></span>
    </div>
  </div>

  <script src="/static/shared/api.js"></script>
  <script src="/static/shared/components.js"></script>
  <script>
    renderNav("user", "agents");

    const preselectedId = getParam("id");
    let currentAgentId = null;
    let sessionId = null;

    async function loadAgents() {
      try {
        const res = await api.get("/agents?status=active");
        const sel = document.getElementById("agent-select");
        (res.data || []).forEach((a) => {
          const opt = document.createElement("option");
          opt.value = a.spec_id;
          opt.textContent = `${a.name} (v${a.version || 1})`;
          sel.appendChild(opt);
        });
        if (preselectedId) {
          sel.value = preselectedId;
          onAgentChange();
        }
      } catch {
        showToast("Agent 読み込みエラー", "error");
      }
    }

    function onAgentChange() {
      currentAgentId = document.getElementById("agent-select").value;
      sessionId = null;
      document.getElementById("session-id").value = "";
      if (currentAgentId) {
        document.getElementById("messages").innerHTML =
          '<div class="empty-state">メッセージを入力して送信してください</div>';
      }
    }

    function addMessage(role, content) {
      const el = document.getElementById("messages");
      const empty = el.querySelector(".empty-state");
      if (empty) empty.remove();

      const msg = document.createElement("div");
      msg.className = `chat-msg ${role}`;
      msg.innerHTML = content;
      el.appendChild(msg);
      el.scrollTop = el.scrollHeight;
    }

    async function ensureSession() {
      if (sessionId) return;
      const res = await api.post("/sessions", {
        agent_id: currentAgentId,
      });
      sessionId = res.data.session_id;
      document.getElementById("session-id").value = sessionId;
    }

    async function sendMessage() {
      if (!currentAgentId) {
        showToast("Agent を選択してください", "error");
        return;
      }

      const input = document.getElementById("chat-input");
      const text = input.value.trim();
      if (!text) return;

      input.value = "";
      addMessage("user", escapeHtml(text));

      const btn = document.getElementById("btn-send");
      btn.disabled = true;
      btn.textContent = "…";

      try {
        await ensureSession();
        const res = await api.post(`/sessions/${sessionId}/messages`, { input: text });
        const data = res.data;

        if (data.trace_id) {
          document.getElementById("trace-bar").classList.remove("hidden");
          document.getElementById("trace-id").textContent = `trace: ${data.trace_id}`;
        }

        addMessage("assistant", escapeHtml(data.output || "(empty response)"));
      } catch (e) {
        addMessage("assistant", `<span style="color:var(--clr-danger)">Error: ${escapeHtml(e.message)}</span>`);
      } finally {
        btn.disabled = false;
        btn.textContent = "送信";
      }
    }

    function escapeHtml(str) {
      if (typeof str !== 'string') return String(str);
      return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
    }

    loadAgents();
  </script>
</body>
</html>
